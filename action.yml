name: 'Encode OTEL Resource Attributes'
description: 'Encodes a multi-line key=value string into an OTEL_RESOURCE_ATTRIBUTES value (W3C Baggage format). Pure bash, no dependencies.'
inputs:
  attributes:
    description: |
      Multi-line string of key=value pairs, one per line.
      Blank lines and surrounding whitespace are ignored; values are percent-encoded.
    required: true
outputs:
  value:
    description: 'The encoded OTEL_RESOURCE_ATTRIBUTES string.'
    value: ${{ steps.encode.outputs.value }}
runs:
  using: 'composite'
  steps:
    - id: encode
      shell: bash
      env:
        ATTRS_INPUT: ${{ inputs.attributes }}   # passed via env, never inlined — avoids script injection
      run: |
        set -euo pipefail
        shopt -s extglob
        percent_encode() {
          local LC_ALL=C s="$1" out='' i c enc
          for ((i=0; i<${#s}; i++)); do
            c="${s:i:1}"
            case "$c" in
              [a-zA-Z0-9._~-]) out+="$c" ;;
              *) printf -v enc '%%%02X' "'$c"; out+="$enc" ;;
            esac
          done
          printf '%s' "$out"
        }
        out=()
        while IFS= read -r line || [ -n "$line" ]; do
          line="${line##+([[:space:]])}"   # ltrim
          line="${line%%+([[:space:]])}"   # rtrim
          [ -z "$line" ] && continue
          if [[ "$line" != *=* ]]; then
            echo "::error::attribute line is missing '=': $line" >&2
            exit 1
          fi
          k="${line%%=*}"
          v="$(percent_encode "${line#*=}")"
          out+=("$k=$v")
        done <<< "$ATTRS_INPUT"

        IFS=,
        echo "value=${out[*]}" >> "$GITHUB_OUTPUT"
